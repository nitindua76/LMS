name: Build and Deploy

# Every push to main: build both images, push to GHCR, then deploy them on
# the production VM. The deploy job requires a self-hosted runner installed
# on that VM (repo Settings -> Actions -> Runners -> New self-hosted runner)
# — see DEPLOYMENT.md. This is what lets an internal-only VM with no public
# IP/inbound access still get automatic deploys: the runner polls GitHub
# outbound, nothing needs to connect in to the VM.

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # lets you trigger a deploy manually from the Actions tab

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      repo_lc: ${{ steps.repo.outputs.lc }}
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase repository name (GHCR requires it)
        id: repo
        run: echo "lc=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push api image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.lc }}-api:latest
            ghcr.io/${{ steps.repo.outputs.lc }}-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.lc }}-web:latest
            ghcr.io/${{ steps.repo.outputs.lc }}-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          # Do NOT let checkout's default clean wipe .env.prod / the
          # generated livekit.prod.yaml — both are gitignored but live in
          # this same checkout directory on the VM, and actions/checkout's
          # default `git clean -ffdx` would delete gitignored files too.
          clean: false

      - name: Log in to GHCR (so this VM's docker daemon can pull)
        shell: powershell
        run: |
          "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Deploy
        shell: powershell
        run: |
          $env:IMAGE_TAG = "${{ github.sha }}"
          # Overrides the auto-set (correctly-cased) GITHUB_REPOSITORY env var
          # for this step — docker-compose.prod.yml needs the lowercased form
          # to match the GHCR tags built above.
          $env:GITHUB_REPOSITORY = "${{ needs.build-and-push.outputs.repo_lc }}"
          .\scripts\deploy.ps1
