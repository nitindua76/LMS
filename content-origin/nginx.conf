server {
    listen 80;
    root /usr/share/nginx/html;

    # CORS: the content origin is intentionally open - auth is token-based, not cookie-based
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' '*' always;

    # Pre-flight
    if ($request_method = 'OPTIONS') {
        return 204;
    }

    # SCORM/cmi5 loader page
    location = /loader {
        try_files /static/loader.html =404;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # Extracted package files.
    # LocalBackend stores objects at {STORAGE_LOCAL_PATH}/{key}.
    # With STORAGE_LOCAL_PATH=/data/lms-content and key=pkg/{content_item_id}/file,
    # the volume lms_content is mounted at /usr/share/nginx/html so files land at
    # /usr/share/nginx/html/pkg/{content_item_id}/file -- served as /pkg/{id}/file.
    location /pkg/ {
        try_files $uri =404;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    location / {
        try_files $uri =404;
    }
}