services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lmspassword}
      POSTGRES_DB: ${POSTGRES_DB:-lms}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5437:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lms}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-lmsadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-lmspassword}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5

  content:
    image: nginx:alpine
    volumes:
      - lms_content:/usr/share/nginx/html
      - ./content-origin/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./content-origin:/usr/share/nginx/html/static:ro
    ports:
      - "5174:80"

  lrs:
    image: python:3.11-slim
    working_dir: /app
    command: >
      sh -c "pip install fastapi uvicorn --quiet --no-cache-dir && uvicorn main:app --host 0.0.0.0 --port 9090"
    volumes:
      - ./mock-lrs:/app
    ports:
      - "9090:9090"
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9090/health')" ]
      interval: 10s
      timeout: 5s
      retries: 5

  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    volumes:
      - ./livekit/livekit.yaml:/etc/livekit.yaml:ro
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-dev-livekit-secret-replace-in-production}"
    ports:
      - "7880:7880"   # signaling / room service HTTP
      - "7881:7881"   # RTC over TCP (fallback when UDP is blocked)
      - "55000-55100:55000-55100/udp"
    depends_on:
      redis:
        condition: service_healthy
    # Production: put this behind a TLS-terminating reverse proxy (wss://),
    # enable turn.enabled in livekit.yaml with a real domain + cert, and run
    # 2+ replicas — the redis-backed config above already supports that
    # without any change to this file beyond `deploy.replicas` / a second
    # service block.

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-lms}:${POSTGRES_PASSWORD:-lmspassword}@db:5432/${POSTGRES_DB:-lms}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      CONTENT_ORIGIN: http://content.local:5174
      API_EXTERNAL_URL: http://lms.local:8000
      SCORM_TOKEN_SECRET: ${SCORM_TOKEN_SECRET:-dev-scorm-secret}
      LRS_ENDPOINT: http://lrs:9090
      STORAGE_BACKEND: local
      STORAGE_LOCAL_PATH: /data/lms-content
      LIVEKIT_URL: ws://localhost:7880
      LIVEKIT_SERVER_URL: http://livekit:7880
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-dev-livekit-secret-replace-in-production}
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      lrs:
        condition: service_healthy
      livekit:
        condition: service_started
    volumes:
      - ./api:/app
      - lms_content:/data/lms-content
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      VITE_API_URL: http://api:8000
    ports:
      - "5173:5173"
    depends_on:
      - api
    volumes:
      - ./web:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
  redis_data:
  minio_data:
  lms_content:
