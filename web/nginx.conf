server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # React Router — any path that isn't a real static file falls back to
    # index.html so client-side routing handles it.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Mirrors vite.config.ts's dev proxy: /api/* -> api service, stripping
    # the /api prefix, so the same relative-path axios client (baseURL "/api")
    # works unchanged in both dev and prod.
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    client_max_body_size 550M; # headroom above MAX_VIDEO_UPLOAD_MB (500) for admin content uploads
}
